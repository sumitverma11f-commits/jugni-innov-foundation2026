<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Jugni Innov Foundation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #c0392b;
      --red-dark: #96281b;
      --bg: #f4f6f9;
      --white: #ffffff;
      --text: #2c3e50;
      --muted: #7f8c8d;
      --border: #dce1e7;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      background: var(--red);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.6rem;
    }

    .brand h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }

    .brand p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text);
      transition: border-color 0.2s;
      outline: none;
      background: #fafbfc;
    }

    input:focus { border-color: var(--red); background: var(--white); }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background: var(--red);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn-login:hover { background: var(--red-dark); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { background: #ccc; cursor: not-allowed; }

    .error-msg {
      background: #fdecea;
      border: 1px solid #f5c6cb;
      color: #c0392b;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error-msg.show { display: block; }

    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">🔐</div>
      <h1>Jugni Admin Panel</h1>
      <p>Sign in to manage submissions</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter admin username" autocomplete="username" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In</button>

    <p class="footer-note">Jugni Innov Foundation &copy; 2026</p>
  </div>

  <script>
    const API = 'http://127.0.0.1:5000/api';

    // Redirect if already logged in
    if (localStorage.getItem('jugni_admin_token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');

      errEl.classList.remove('show');

      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch(`${API}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('jugni_admin_token', data.token);
          window.location.href = 'dashboard.html';
        } else {
          showError(data.message || 'Login failed. Check credentials.');
        }
      } catch {
        showError('Cannot connect to server. Make sure the backend is running on port 5000.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }
  </script>
</body>
</html>
